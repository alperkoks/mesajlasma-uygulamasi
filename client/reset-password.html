<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Sıfırlama - Hızlı Mesajlaşma</title>
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --error: #f43f5e;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8 0%, #4f46e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            display: inline-block;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            display: none;
            line-height: 1.5;
        }

        .alert-success {
            background-color: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        .alert-error {
            background-color: rgba(244, 63, 94, 0.15);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: var(--error);
        }

        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-link a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="logo">💬 Hızlı Mesajlaşma</span>
            <h2 class="title">Yeni Şifre Belirleyin</h2>
            <p class="subtitle">Güçlü ve unutmayacağınız yeni bir şifre girin</p>
        </div>

        <div id="alertSuccess" class="alert alert-success"></div>
        <div id="alertError" class="alert alert-error"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="password">Yeni Şifre</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Yeni Şifre (Tekrar)</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" class="btn">Şifreyi Güncelle</button>
        </form>

        <div class="footer-link">
            <a href="/">Giriş Ekranına Dön</a>
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('resetForm');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const alertSuccess = document.getElementById('alertSuccess');
        const alertError = document.getElementById('alertError');

        // URL'den token değerini çek
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showAlert(alertError, 'Şifre sıfırlama anahtarı (token) eksik veya geçersiz. Lütfen sıfırlama e-postasındaki linke tıkladığınızdan emin olun.');
            resetForm.querySelector('button').disabled = true;
            resetForm.querySelectorAll('input').forEach(el => el.disabled = true);
        }

        function showAlert(element, message) {
            alertSuccess.style.display = 'none';
            alertError.style.display = 'none';
            element.textContent = message;
            element.style.display = 'block';
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (password !== confirmPassword) {
                showAlert(alertError, 'Şifreler uyuşmuyor. Lütfen iki alanı da kontrol edin.');
                return;
            }

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showAlert(alertError, data.message || 'Şifre sıfırlanırken hata oluştu.');
                    return;
                }

                showAlert(alertSuccess, 'Şifreniz başarıyla güncellendi! 3 saniye içinde giriş ekranına yönlendiriliyorsunuz...');
                resetForm.reset();
                resetForm.querySelector('button').disabled = true;

                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);

            } catch (err) {
                showAlert(alertError, 'Bağlantı hatası oluştu. Lütfen daha sonra tekrar deneyin.');
            }
        });
    </script>
</body>
</html>
